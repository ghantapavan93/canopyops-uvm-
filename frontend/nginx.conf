server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers. Kept conservative on purpose: no restrictive CSP
    # here because MapLibre uses web workers + cross-origin basemap tiles that a
    # naive policy would break — that needs its own tested policy. These three are
    # safe and address clickjacking + MIME-sniffing + referrer leakage.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI container on the compose network.
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Service worker + its manifest must never be cached aggressively.
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache";
    }
    location = /ngsw.json {
        add_header Cache-Control "no-cache";
    }
    location = /safety-worker.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }
}
