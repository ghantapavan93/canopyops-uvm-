name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: canopyops
          POSTGRES_PASSWORD: canopyops
          POSTGRES_DB: canopyops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U canopyops"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      # Mirror the REAL two-role setup, exactly as production runs it.
      #
      # ADMIN_DATABASE_URL is the superuser: alembic + seed need it (the app role
      # doesn't exist until the RLS migration CREATEs it).
      #
      # DATABASE_URL is the NON-superuser app role. This matters: superusers
      # bypass Row-Level Security unconditionally, so pointing the app at the
      # superuser meant CI exercised ZERO of the DB-level tenant isolation —
      # a dropped policy or a removed FORCE ROW LEVEL SECURITY would have gone
      # green. (It also made test_rls_enforced_at_the_database_even_for_raw_sql
      # fail by construction — that test asserts the DB blocks a cross-tenant
      # raw-SQL read, which a superuser is entitled to do.)
      #
      # The role + password are created by migration f7a1c2d8e934.
      ADMIN_DATABASE_URL: postgresql+psycopg2://canopyops:canopyops@localhost:5432/canopyops
      DATABASE_URL: postgresql+psycopg2://canopyops_app:canopyops_app@localhost:5432/canopyops
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Migrate + seed
        working-directory: backend
        # alembic reads effective_admin_url, so this runs as the superuser and
        # creates the canopyops_app role that pytest then connects as.
        run: |
          alembic upgrade head
          python -m app.seed
      - name: Verify the app role is actually RLS-bound
        working-directory: backend
        # Fail loudly if the app role ever gains SUPERUSER/BYPASSRLS — either
        # would silently void every tenant boundary in the app with no error.
        run: |
          python - <<'PY'
          from sqlalchemy import create_engine, text
          from app.core.config import get_settings
          with create_engine(get_settings().effective_admin_url).connect() as c:
              row = c.execute(text(
                  "SELECT rolsuper, rolbypassrls FROM pg_roles WHERE rolname='canopyops_app'"
              )).one_or_none()
          assert row is not None, "canopyops_app role missing — did the RLS migration run?"
          assert row == (False, False), f"app role must not be SUPERUSER/BYPASSRLS, got {row}"
          print("app role is a plain non-superuser — RLS will apply")
          PY
      - name: Run pytest
        working-directory: backend
        run: pytest

      - name: Engineering Evidence must not lie about the test count
        # The screen's whole claim is "these numbers are real". They used to be
        # hand-typed and drifted (it showed 136 while the suite was at 144). This
        # re-runs the suite and fails if the number the app displays disagrees.
        run: python scripts/test_evidence.py --check --suite pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Unit tests (Jest)
        working-directory: frontend
        run: npm test -- --ci
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Engineering Evidence must not lie about the Jest count
        run: python scripts/test_evidence.py --check --suite jest
      - name: Production build
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start the full stack (web + api + db)
        run: docker compose up --build -d
      - name: Wait for the app, then warm the API
        run: |
          ready=""
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/health >/dev/null \
               && curl -sf http://localhost:8080/ >/dev/null; then
              echo "stack ready"; ready=1; break
            fi
            sleep 3
          done
          if [ -z "$ready" ]; then echo "stack not ready"; docker compose logs --tail 80; exit 1; fi
          # Warm cold code paths (shapely + PostGIS spatial) before the e2e run so
          # the first offline-sync submit isn't slow enough to trip a timeout.
          curl -sf http://localhost:8080/api/treatments >/dev/null || true
          curl -sf http://localhost:8080/api/overview >/dev/null || true
          curl -sf http://localhost:8080/api/stewardship >/dev/null || true
          curl -sf -X POST http://localhost:8080/api/geo/analyze \
            -H 'Content-Type: application/json' \
            -d '{"geometry":{"type":"Polygon","coordinates":[[[-83.19,40.11],[-83.185,40.11],[-83.185,40.113],[-83.19,40.113],[-83.19,40.11]]]}}' \
            >/dev/null || true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps (incl. Cypress binary)
        working-directory: frontend
        run: npm ci
      - name: Run Cypress critical journey (headless)
        working-directory: frontend
        run: npx cypress run --browser electron
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Engineering Evidence must not lie about the Cypress count
        # Re-seed first: the critical journey consumes its fixture record, so a
        # second run against the same DB would fail for state, not for code.
        run: |
          docker compose exec -T api python -m app.seed
          python scripts/test_evidence.py --check --suite cypress
      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail 120
