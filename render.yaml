# Render Blueprint — CanopyOps API (free tier).
#
# HONEST NOTE ON TOPOLOGY: this deploys the API only. Render's free tier has no
# background-service type, so the durable job queue runs INSIDE the API process
# (RUN_WORKER_IN_PROCESS=true) rather than as its own container. That is a real
# downgrade from the compose/VPS topology — see docs/DEPLOY.md. The database is
# Neon (not Render Postgres, which expires 30 days after creation) and evidence
# lives in Cloudflare R2 (Render has no object storage).
services:
  - type: web
    name: canopyops-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      # --- Database: Neon (PostGIS) -------------------------------------------
      # DATABASE_URL must be the NON-superuser app role (canopyops_app) or
      # Row-Level Security is silently bypassed and tenant isolation dies with no
      # error. Create it with SQL (CREATE ROLE ... WITH LOGIN PASSWORD ...) —
      # roles created via the Neon console inherit neon_superuser, which carries
      # BYPASSRLS and would defeat even FORCE ROW LEVEL SECURITY.
      - key: DATABASE_URL
        sync: false
      # The Neon owner role — runs alembic migrations + seed.
      - key: ADMIN_DATABASE_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true          # never ship the hardcoded dev default
      - key: FRONTEND_ORIGIN
        sync: false                  # the Vercel origin, for CORS
      - key: ENVIRONMENT
        value: render-free

      # --- Free-tier fallbacks -------------------------------------------------
      - key: RUN_WORKER_IN_PROCESS
        value: "true"                # no background-service type on free
      - key: WEB_CONCURRENCY
        value: "1"                   # >1 would start a redundant poller per worker
      - key: SEED_ON_START
        value: "true"                # synthetic demo data

      # --- Evidence storage ----------------------------------------------------
      # The in-process adapter, deliberately — it keeps this deploy to three
      # services instead of four.
      #
      # Nothing in the demonstration path needs a real bucket: the executions
      # endpoint writes EvidenceItem rows with genuine STORED / FAILED states, so
      # the golden record's failed after-photo, the evidence gate, and the guided
      # sync recovery all behave exactly as they do locally. Only the presigned
      # PUT -> upload -> finalize flow needs object storage, and no screen in the
      # demo drives it (it is covered by tests, and against real MinIO in compose).
      #
      # To make that path live too: set STORAGE_BACKEND=s3 and add
      # STORAGE_ENDPOINT / STORAGE_ACCESS_KEY / STORAGE_SECRET_KEY / STORAGE_BUCKET
      # / STORAGE_REGION=auto, pointing at a Cloudflare R2 bucket (free 10GB, zero
      # egress) with a CORS rule allowing the Vercel origin. See docs/DEPLOY.md.
      - key: STORAGE_BACKEND
        value: memory

      # Free instances have modest CPU; keep the pool small.
      - key: DB_POOL_SIZE
        value: "3"
      - key: DB_MAX_OVERFLOW
        value: "2"

# KEEP-WARM lives in .github/workflows/keepwarm.yml, not here.
#
# Render spins a free web service down after 15 minutes without INBOUND traffic
# and then takes ~1 minute to wake — long enough for a reviewer to form an
# opinion while watching a spinner. It needs pinging every ~10 minutes.
#
# A Render cron would be the obvious place for that, except Render cron jobs are
# NOT free, so putting one in this blueprint would either be rejected or quietly
# start charging for a $0 deploy. A GitHub Actions schedule does the same job for
# nothing. Render grants 750 free instance-hours/month; kept warm 24/7 a single
# service uses ~730 — it fits, but it is the WHOLE allowance, so don't run a
# second free service beside it.
