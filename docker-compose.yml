name: canopyops

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: canopyops
      POSTGRES_PASSWORD: canopyops
      POSTGRES_DB: canopyops
    ports:
      # Host 5433 avoids colliding with a native PostgreSQL on 5432.
      # In-container clients still use db:5432 over the compose network.
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canopyops -d canopyops"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: canopyops
      MINIO_ROOT_PASSWORD: canopyops-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://canopyops:canopyops@db:5432/canopyops
      FRONTEND_ORIGIN: http://localhost:8080
      SEED_ON_START: "true"
      # Scalability / reliability knobs (see app/core/config.py). Kept at 1
      # worker locally so the in-process metrics registry stays coherent for
      # the System Health panel; bump WEB_CONCURRENCY to scale across cores.
      WEB_CONCURRENCY: "1"
      MAX_CONCURRENT_REQUESTS: "64"
      DB_STATEMENT_TIMEOUT_MS: "15000"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      # Per-client token-bucket rate limit + database circuit breaker.
      RATE_LIMIT_PER_MIN: "240"
      RATE_LIMIT_BURST: "60"
      DB_BREAKER_FAILURE_THRESHOLD: "5"
      DB_BREAKER_RESET_TIMEOUT_S: "10"
      # OpenTelemetry: traces are always produced (X-Trace-Id + log correlation).
      # To export to a collector, set OTEL_EXPORTER_OTLP_ENDPOINT here, e.g.
      #   OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
      OTEL_SERVICE_NAME: "canopyops-api"
      # Evidence object storage (MinIO, S3-compatible).
      STORAGE_BACKEND: "s3"
      STORAGE_ENDPOINT: "http://minio:9000"
      STORAGE_ACCESS_KEY: "canopyops"
      STORAGE_SECRET_KEY: "canopyops-secret"
      STORAGE_BUCKET: "evidence"
    ports:
      # Host 8001 so the containerized API doesn't collide with a local dev
      # uvicorn on 8000. The web container reaches it internally as api:8000.
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build: ./backend
    restart: unless-stopped
    # Override the API entrypoint (migrations + uvicorn) — just run the worker
    # loop. depends_on api-healthy guarantees migrations have already run.
    entrypoint: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg2://canopyops:canopyops@db:5432/canopyops
      OTEL_SERVICE_NAME: "canopyops-api"
      STORAGE_BACKEND: "s3"
      STORAGE_ENDPOINT: "http://minio:9000"
      STORAGE_ACCESS_KEY: "canopyops"
      STORAGE_SECRET_KEY: "canopyops-secret"
      STORAGE_BUCKET: "evidence"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      api:
        condition: service_healthy

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
  minio_data:
